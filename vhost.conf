<VirtualHost *:8080>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
    </Directory>

    # Proxy WebSocket connections for Reverb
    ProxyPass "/app/" "ws://127.0.0.1:8081/app/" retry=0
    ProxyPassReverse "/app/" "ws://127.0.0.1:8081/app/"
    
    # Proxy HTTP API connections for Reverb
    ProxyPass "/apps/" "http://127.0.0.1:8081/apps/" retry=0
    ProxyPassReverse "/apps/" "http://127.0.0.1:8081/apps/"

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
